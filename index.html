<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0, viewport-fit=cover">

<meta http-equiv="Cache-Control"
content="no-cache, no-store, must-revalidate">

<title>Control Horas</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{

background:
linear-gradient(
180deg,
#030712 0%,
#050816 100%
);

font-family:-apple-system;

color:white;

padding:
max(20px, env(safe-area-inset-top))
20px
40px;

min-height:100vh;

}

.card{

background:
rgba(11,18,32,.85);

backdrop-filter:
blur(20px);

border:
1px solid rgba(255,255,255,.05);

border-radius:32px;

padding:25px;

margin-bottom:20px;

box-shadow:
0 0 40px rgba(168,85,247,.08);

}

.title{

font-size:56px;
font-weight:800;
line-height:1;
margin-bottom:10px;

}

.gradient{

background:
linear-gradient(
90deg,
#A855F7,
#22D3EE
);

-webkit-background-clip:text;
-webkit-text-fill-color:transparent;

}

.subtitle{

opacity:.7;
font-size:18px;

}

.section-title{

font-size:28px;
font-weight:700;
margin-bottom:20px;

}

.stat{

display:flex;
justify-content:space-between;

padding:15px 0;

border-bottom:
1px solid rgba(255,255,255,.05);

font-size:22px;

}

.value{

color:#22D3EE;
font-weight:700;

}

.record{

padding:18px 0;

border-bottom:
1px solid rgba(255,255,255,.05);

}

.record-top{

display:flex;
justify-content:space-between;

margin-bottom:8px;

}

.type{

padding:6px 14px;

border-radius:999px;

font-size:14px;
font-weight:700;

}

.extra{
background:rgba(34,211,238,.12);
color:#22D3EE;
}

.sabado{
background:rgba(168,85,247,.12);
color:#A855F7;
}

.festivo{
background:rgba(0,255,153,.12);
color:#00FF99;
}

.small{
opacity:.6;
}

.period{

display:inline-block;

margin-top:20px;

padding:10px 18px;

border-radius:999px;

background:
rgba(255,255,255,.05);

font-size:15px;

}

input,
select{

width:100%;

padding:16px;

margin-bottom:15px;

border:none;

border-radius:18px;

background:
rgba(255,255,255,.06);

color:white;

font-size:18px;

}

button{

width:100%;

padding:18px;

border:none;

border-radius:20px;

background:
linear-gradient(
90deg,
#A855F7,
#22D3EE
);

color:white;

font-size:18px;
font-weight:700;

}

.error{

margin-top:15px;

color:#FF7070;

font-size:16px;

}

.success{

margin-top:15px;

color:#00FF99;

font-size:16px;

}

</style>

</head>

<body>

<div class="card">

<div class="title">

Control
<br>

<span class="gradient">
Horas
</span>

</div>

<div class="subtitle">
Sistema cerrado de control horario
</div>

<div
class="period"
id="periodText">
Periodo
</div>

</div>

<div class="card">

<div class="section-title">
Nuevo registro
</div>

<form id="recordForm">

<input
type="date"
id="date"
required>

<select id="type">

<option value="">
Seleccionar tipo
</option>

<option value="Extra">
Extra
</option>

<option value="Sábado">
Sábado
</option>

<option value="Festivo">
Festivo
</option>

</select>

<input
type="number"
step="0.1"
placeholder="Horas"
id="hours"
required>

<input
type="text"
placeholder="Observaciones (opcional)"
id="notes">

<button type="submit">
Registrar
</button>

<div id="message"></div>

</form>

</div>

<div class="card">

<div class="section-title">
Resumen periodo actual
</div>

<div class="stat">

<span>Horas Extra</span>

<span
class="value"
id="extraTotal">
0h
</span>

</div>

<div class="stat">

<span>Sábados</span>

<span
class="value"
id="sabadoTotal">
0h
</span>

</div>

<div class="stat">

<span>Festivos</span>

<span
class="value"
id="festivoTotal">
0h
</span>

</div>

<div class="stat">

<span>Total acumulado</span>

<span
class="value"
id="globalTotal">
0h
</span>

</div>

</div>

<div class="card">

<div class="section-title">
Registros válidos
</div>

<div id="recordsList"></div>

</div>

<script>

const VALID_TYPES = [
'Extra',
'Sábado',
'Festivo'
];

function getPeriod(date){

const year = date.getFullYear();
const month = date.getMonth();

let start;
let end;

if(date.getDate() >= 15){

start =
new Date(year, month, 15);

end =
new Date(year, month + 1, 15);

}else{

start =
new Date(year, month - 1, 15);

end =
new Date(year, month, 15);

}

return { start, end };

}

const today = new Date();

const currentPeriod =
getPeriod(today);

document
.getElementById('periodText')
.innerText =

`${formatDate(currentPeriod.start)}
 →
${formatDate(currentPeriod.end)}`;

let records =

JSON.parse(
localStorage.getItem('records')
)
|| [];

render();

document
.getElementById('recordForm')
.addEventListener(
'submit',
function(e){

e.preventDefault();

const date =
document
.getElementById('date')
.value;

const type =
document
.getElementById('type')
.value;

const hours =
parseFloat(
document
.getElementById('hours')
.value
);

const notes =
document
.getElementById('notes')
.value;

const message =
document
.getElementById('message');

message.innerHTML = '';

if(!date || !type || !hours){

message.innerHTML =
'<div class="error">Campos obligatorios incompletos</div>';

return;

}

if(!VALID_TYPES.includes(type)){

message.innerHTML =
'<div class="error">Tipo inválido</div>';

return;

}

const recordDate =
new Date(date);

const validPeriod =

(recordDate >= currentPeriod.start)
&&
(recordDate < currentPeriod.end);

if(!validPeriod){

message.innerHTML =
'<div class="error">Fecha fuera del periodo activo</div>';

return;

}

records.push({
date,
type,
hours,
notes
});

localStorage.setItem(
'records',
JSON.stringify(records)
);

message.innerHTML =
'<div class="success">Registro guardado</div>';

document
.getElementById('recordForm')
.reset();

render();

});

function render(){

let extra = 0;
let sabado = 0;
let festivo = 0;

const list =
document.getElementById('recordsList');

list.innerHTML = '';

records.sort(
(a,b)=>
new Date(b.date)
-
new Date(a.date)
);

records.forEach(record=>{

const recordDate =
new Date(record.date);

const validRange =

(recordDate >= currentPeriod.start)
&&
(recordDate < currentPeriod.end);

if(!validRange)
return;

if(record.type === 'Extra')
extra += record.hours;

if(record.type === 'Sábado')
sabado += record.hours;

if(record.type === 'Festivo')
festivo += record.hours;

list.innerHTML += `

<div class="record">

<div class="record-top">

<div>
${formatDate(record.date)}
</div>

<div class="type ${getTypeClass(record.type)}">
${record.type}
</div>

</div>

<div class="small">
${record.hours} horas
</div>

${
record.notes
?
`<div class="small">
${record.notes}
</div>`
:
''
}

</div>

`;

});

document
.getElementById('extraTotal')
.innerText =
`${extra}h`;

document
.getElementById('sabadoTotal')
.innerText =
`${sabado}h`;

document
.getElementById('festivoTotal')
.innerText =
`${festivo}h`;

document
.getElementById('globalTotal')
.innerText =
`${extra + sabado + festivo}h`;

}

function formatDate(date){

const d = new Date(date);

return d.toLocaleDateString(
'es-ES',
{
day:'2-digit',
month:'2-digit',
year:'2-digit'
}
);

}

function getTypeClass(type){

if(type === 'Extra')
return 'extra';

if(type === 'Sábado')
return 'sabado';

if(type === 'Festivo')
return 'festivo';

return '';

}

</script>

</body>
</html>
